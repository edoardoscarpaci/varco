# Root workspace coordinator — not a package itself.
# Run `uv sync` from this directory to install all workspace members.
#
# DESIGN: uv workspace over individual per-package virtual envs
#   ✅ Single lock file (uv.lock) covers all packages — reproducible builds.
#   ✅ Workspace members share a virtual env — no path-dep reinstall overhead.
#   ✅ `uv run pytest` in any sub-directory uses the shared env.
#   ❌ All packages must be compatible with the same Python version range.
[tool.uv.workspace]
members = [
    "varco_core",
    "varco_kafka",
    "varco_redis",
    "varco_beanie",
    "varco_sa",
    "varco_memcached",
    "varco_ws",
    "varco_fastapi",
]

[tool.uv.sources]
# Use the vendored wheel of providify 0.1.6 so all workspace members pick up
# the latest scanner that discovers @Configuration classes via scan().
# The wheel is a pre-built copy of /home/edoardo/projects/providify at 0.1.6.
#
# DESIGN: vendored wheel over editable path source
#   ✅ Docker-compatible — the wheel file is inside the build context (vendor/).
#   ✅ Reproducible — the exact wheel contents are captured in the repo.
#   ✅ Single declaration — applies to every workspace member automatically.
#   ❌ Must re-build the wheel (uv build in providify/) when providify changes.
#   ❌ Wheel file committed to git — larger repo than a PyPI version pin.
providify = { path = "vendor/providify-0.1.6-py3-none-any.whl" }

[dependency-groups]
dev = [
    "asyncpg>=0.31.0",
]
