repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.1
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  # ── Per-package test suites ─────────────────────────────────────────────────
  # Each hook runs uv run --package <name> pytest from the repo root so all
  # packages share the single workspace .venv.
  #
  # Integration tests (real Kafka / Redis / MongoDB via testcontainers) are
  # excluded here — they require Docker and are slow.  Run them explicitly:
  #   uv run pytest -m integration

  - repo: local
    hooks:
      - id: pytest-core
        name: pytest (varco_core)
        entry: uv run --package varco-core pytest varco_core/tests --tb=short -q
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: pytest-beanie
        name: pytest (varco_beanie)
        entry: uv run --package varco-beanie pytest varco_beanie/tests --tb=short -q
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: pytest-sa
        name: pytest (varco_sa)
        entry: uv run --package varco-sa pytest varco_sa/tests --tb=short -q
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: pytest-kafka
        name: pytest (varco_kafka)
        entry: uv run --package varco-kafka pytest varco_kafka/tests --tb=short -q
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: pytest-redis
        name: pytest (varco_redis)
        entry: uv run --package varco-redis pytest varco_redis/tests --tb=short -q
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: pytest-fastapi
        name: pytest (varco_fastapi)
        entry: uv run --package varco-fastapi pytest varco_fastapi/tests --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
  
  - repo: local
    hooks:
      - id: pytest-memcached
        name: pytest (varco_memcached)
        entry: uv run --package varco-memcached pytest varco_memcached/tests --tb=short -q
        language: system
        pass_filenames: false
        always_run: true

