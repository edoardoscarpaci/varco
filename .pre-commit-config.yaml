repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.1
    hooks:
      - id: ruff
        args: [--fix]  # Auto-fix what it can

  # Optional: also auto-format with black
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
