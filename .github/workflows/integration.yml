# For now just disable the integration actions it runs only locally
# # CI — integration tests that require live broker services (Kafka, Redis, MongoDB).
# #
# # DESIGN: separated from test.yml
# #   ✅ Unit tests remain fast (< 2 min) and don't require Docker service startup.
# #   ✅ Integration tests can be scheduled nightly or triggered manually without
# #      blocking every PR.
# #   ✅ Service containers are only spun up for packages that need them — no
# #      unnecessary Kafka container for a Redis-only test run.
# #   ❌ Two workflows to maintain — accepted because the separation is principled.
# #
# # Trigger: push to main, pull_request touching backend packages, or manual dispatch.

